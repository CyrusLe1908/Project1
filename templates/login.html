<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống NPP</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/Logo THP 2.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            border: none;
            border-radius: 16px;
            background-color: #ffffff;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
        }
        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
        }
        .form-control {
            border-left: none;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }
        .btn-login {
            background: linear-gradient(90deg, #0d6efd 0%, #0a58ca 100%);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-login:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="card login-card p-4">
        <div class="card-body">
            
            <div class="text-center mb-4">
                <div class="display-5 text-primary mb-2">
                    <img src="{{ url_for('static', filename='images/Logo THP.png') }}" alt="Logo THP" 
                         class="img-fluid mb-2" 
                         style="width: 70px; height: 70px; object-fit: cover; clip-path: circle(38%); display: inline-block;">
                </div>
                <h4 class="fw-bold text-dark mb-1">NPP MANAGER</h4>
                <p class="text-muted small">Hệ thống quản lý kho và đại lý phân phối</p>
            </div>

            <form id="loginForm">
                
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">Tên đăng nhập</label>
                    <div class="input-group">
                        <span class="input-group-text text-muted"><i class="fa-solid fa-user"></i></span>
                        <input
                            type="text"
                            id="username"
                            class="form-control"
                            placeholder="Nhập username của bạn"
                            required>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label class="form-label small fw-semibold text-secondary mb-0">Mật khẩu</label>
                        <a href="#" class="text-decoration-none small" style="font-size: 0.8rem;">Quên mật khẩu?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text text-muted"><i class="fa-solid fa-lock"></i></span>
                        <input
                            type="password"
                            id="password"
                            class="form-control"
                            placeholder="••••••••"
                            required>
                    </div>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label small text-secondary" for="rememberMe">
                        Duy trì đăng nhập trên thiết bị này
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-login w-100 text-white shadow-sm">
                    ĐĂNG NHẬP <i class="fa-solid fa-right-to-bracket ms-1"></i>
                </button>
                
            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>

const API_BASE_URL = '/api';

document.getElementById('loginForm').addEventListener('submit', function(e){

    e.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    fetch(`${API_BASE_URL}/login`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ username, password })
    })
    .then(response => response.json())
    .then(data => {
        if(data.success){
            localStorage.setItem('user', JSON.stringify(data.user));
            alert('Đăng nhập thành công!');
            window.location.href = '/';
        } else {
            alert(data.message || 'Sai tài khoản hoặc mật khẩu');
        }
    })
    .catch(err => {
        console.error(err);
        alert('Không thể kết nối tới Server Flask');
    });

});

</script>
</body>
</html>
